apiVersion: "kubeflow.org/v1"
kind: "PyTorchJob"
metadata:
  name: "pytorch-distributed-job"
  namespace: "kubeflow"
spec:
  pytorchReplicaSpecs:
    Master:
      replicas: 1
      restartPolicy: OnFailure
      template:
        spec:
          containers:
          - name: pytorch
            image: pytorch/pytorch:1.13.1-cuda11.6-cudnn8-runtime
            imagePullPolicy: IfNotPresent
            command:
            - python
            - /workspace/train.py
            env:
            - name: MASTER_ADDR
              value: "pytorch-distributed-job-master-0"
            - name: MASTER_PORT
              value: "29500"
            - name: WORLD_SIZE
              value: "3"
            resources:
              limits:
                nvidia.com/gpu: 1
          volumes:
          - name: workspace
            persistentVolumeClaim:
              claimName: workspace-pvc
          volumeMounts:
          - name: workspace
            mountPath: /workspace
    Worker:
      replicas: 2
      restartPolicy: OnFailure
      template:
        spec:
          containers:
          - name: pytorch
            image: pytorch/pytorch:1.13.1-cuda11.6-cudnn8-runtime
            imagePullPolicy: IfNotPresent
            command:
            - python
            - /workspace/train.py
            env:
            - name: MASTER_ADDR
              value: "pytorch-distributed-job-master-0"
            - name: MASTER_PORT
              value: "29500"
            - name: WORLD_SIZE
              value: "3"
            resources:
              limits:
                nvidia.com/gpu: 1
          volumes:
          - name: workspace
            persistentVolumeClaim:
              claimName: workspace-pvc
          volumeMounts:
          - name: workspace
            mountPath: /workspace
